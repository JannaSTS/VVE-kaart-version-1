let currentMode = 'taart';
let markers = [];

const map = L.map('map', {preferCanvas:false}).setView([52.355, 4.945], 14);

L.tileLayer('https://service.pdok.nl/brt/achtergrondkaart/wmts/v2_0/grijs/EPSG:3857/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://www.kadaster.nl">Kadaster</a>',
  minZoom:6, maxZoom:19
}).addTo(map);

document.getElementById('sg').textContent = DATA.filter(v=>v.groot).length;
document.getElementById('sk').textContent = DATA.filter(v=>!v.groot).length;
document.getElementById('st').textContent = DATA.length;

let geladen=0, errors=0;

function setMode(mode) {
  currentMode = mode;
  ['taart','voortgang','grootte'].forEach(m => {
    document.getElementById('tab-'+m).className = 'tab' + (m===mode?' active':'');
  });
  markers.forEach(m => {
    if (m.setIcon) m.setIcon(makeIcon(m._vve, mode));
  });
}

function makeIcon(vve, mode) {
  const isGroot = vve.groot;
  const isTwijfel = vve.twijfel;
  const pct = vve.pct;
  const size = isGroot ? Math.min(28 + vve.totaal/4, 56) : 22;
  const half = size/2;

  let svg = '';

  if (mode === 'taart') {
    // Pie chart: green = signed, colored = rest
    const baseColor = isGroot ? '#e84040' : '#4da6ff';
    const angle = pct/100 * 360;
    const r = half - 2;

    if (pct === 0) {
      svg = `<circle cx="${half}" cy="${half}" r="${r}" fill="${baseColor}" stroke="${isTwijfel?'#888':'#fff'}" stroke-width="${isTwijfel?1:1.5}" stroke-dasharray="${isTwijfel?'3 2':'none'}"/>`;
    } else if (pct >= 100) {
      svg = `<circle cx="${half}" cy="${half}" r="${r}" fill="#27ae60" stroke="#fff" stroke-width="1.5"/>`;
    } else {
      const rad = (angle - 90) * Math.PI/180;
      const x = half + r * Math.cos(rad);
      const y = half + r * Math.sin(rad);
      const large = angle > 180 ? 1 : 0;
      svg = `
        <circle cx="${half}" cy="${half}" r="${r}" fill="${baseColor}"/>
        <path d="M${half},${half} L${half},${half-r} A${r},${r} 0 ${large},1 ${x},${y} Z" fill="#27ae60"/>
        <circle cx="${half}" cy="${half}" r="${r}" fill="none" stroke="${isTwijfel?'#888':'#fff'}" stroke-width="${isTwijfel?1:1.5}" stroke-dasharray="${isTwijfel?'3 2':'none'}"/>
      `;
    }
  } else if (mode === 'voortgang') {
    // Color = how far along (green=100%, red=0%)
    const r2 = g2 = 0;
    const hue = pct * 1.2; // 0=red(0), 100=green(120)
    const color = `hsl(${hue},80%,45%)`;
    const displayR = 10;
    svg = `<circle cx="${half}" cy="${half}" r="${displayR}" fill="${color}" stroke="#fff" stroke-width="1.5"/>
           <text x="${half}" y="${half+4}" text-anchor="middle" font-size="8" fill="white" font-weight="bold">${pct}%</text>`;
  } else {
    // Grootte only
    const baseColor = isGroot ? '#e84040' : '#4da6ff';
    const displayR = isGroot ? Math.min(10+vve.totaal/5,24) : 7;
    svg = `<circle cx="${half}" cy="${half}" r="${displayR}" fill="${baseColor}" stroke="${isTwijfel?'#888':'#fff'}" stroke-width="${isTwijfel?1:1.5}" stroke-dasharray="${isTwijfel?'3 2':'none'}" fill-opacity="${isTwijfel?0.4:0.85}"/>`;
  }

  return L.divIcon({
    html: `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`,
    className: '',
    iconSize: [size, size],
    iconAnchor: [half, half]
  });
}

function showPanel(vve) {
  document.getElementById('pn').textContent = vve.naam;
  const pb = document.getElementById('pb');
  pb.textContent = (vve.groot?'GROOT':'KLEIN')+' — '+vve.totaal+' adressen';
  pb.className = 'badge '+(vve.groot?'bg':'bk');
  document.getElementById('pf').style.width = vve.pct+'%';
  document.getElementById('pl').textContent = vve.getekend+' van '+vve.totaal+' getekend ('+vve.pct+'%)';
  document.getElementById('pt').textContent = vve.totaal;
  document.getElementById('pg').textContent = vve.getekend + (vve.pct===100?' ✓':'');
  document.getElementById('ps').innerHTML = vve.bron==='bewonersreis'
    ? '<span class="bb">bewonersreis</span>'
    : '<span class="bk2">KvK adres'+(vve.twijfel?' ⚠':'')+' </span>';
  document.getElementById('pa').textContent = vve.rep_straat+' '+vve.rep_hn+' · '+vve.rep_pc;
  document.getElementById('panel').style.display='block';
}

function tick() {
  geladen++;
  document.getElementById('sl').textContent = geladen;
  if (geladen >= DATA.length) {
    document.getElementById('statusbar').className='done';
    document.getElementById('spin').style.display='none';
    document.getElementById('stxt').textContent = `✓ ${DATA.length} VvE's geladen — ${errors} niet gevonden`;
  } else {
    document.getElementById('stxt').textContent = `Geocodering via PDOK... ${geladen} / ${DATA.length}`;
  }
}

async function plot(vve) {
  const q = encodeURIComponent(vve.rep_straat+' '+vve.rep_hn+' Amsterdam');
  try {
    const r = await fetch(`https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=${q}&rows=1&fl=centroide_ll`,
      {signal:AbortSignal.timeout(10000)});
    const d = await r.json();
    const docs = d?.response?.docs;
    if (docs?.length && docs[0].centroide_ll) {
      const m = docs[0].centroide_ll.match(/POINT\(([0-9.]+)\s+([0-9.]+)\)/);
      if (m) {
        const lat=parseFloat(m[2]), lon=parseFloat(m[1]);
        const marker = L.marker([lat,lon], {icon: makeIcon(vve, currentMode)});
        marker._vve = vve;
        marker.bindTooltip(
          `<strong>${vve.naam}</strong><br>${vve.totaal} adressen · ${vve.getekend} getekend (${vve.pct}%)`,
          {sticky:true});
        marker.on('click',()=>showPanel(vve));
        marker.addTo(map);
        markers.push(marker);
        tick(); return;
      }
    }
  } catch(e) {}
  errors++; tick();
}

async function loadAll() {
  for (let i=0;i<DATA.length;i+=6) {
    await Promise.all(DATA.slice(i,i+6).map(plot));
    if (i+6<DATA.length) await new Promise(r=>setTimeout(r,200));
  }
}
loadAll();
