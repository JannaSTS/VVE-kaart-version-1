<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#1a1a1a; color:#fff; height:100vh; display:flex; flex-direction:column; }

  header { padding:9px 14px; background:#111; border-bottom:1px solid #222; display:flex; align-items:center; gap:14px; flex-wrap:wrap; flex-shrink:0; }
  header h1 { font-size:13px; font-weight:600; white-space:nowrap; }
  .stats { margin-left:auto; font-size:11px; color:#666; }
  .stats b { color:#fff; }

  /* VIEW TABS */
  #viewtabs { display:flex; background:#0d0d0d; border-bottom:1px solid #222; flex-shrink:0; overflow-x:auto; }
  .vtab { padding:8px 16px; font-size:11px; cursor:pointer; color:#666; border-bottom:2px solid transparent; white-space:nowrap; user-select:none; transition:color .15s; }
  .vtab:hover { color:#aaa; }
  .vtab.active { color:#fff; border-bottom-color:#4da6ff; }

  /* LEGEND */
  #legend { padding:7px 14px; background:#0a0a0a; border-bottom:1px solid #1a1a1a; display:flex; gap:14px; align-items:center; flex-wrap:wrap; flex-shrink:0; font-size:11px; }
  .leg { display:flex; align-items:center; gap:5px; color:#aaa; }
  .ld { width:12px; height:12px; border-radius:50%; flex-shrink:0; border:1.5px solid rgba(255,255,255,.2); }

  #statusbar { padding:5px 14px; font-size:11px; background:#1a2a3a; color:#6aaddf; border-bottom:1px solid #1f3a55; display:flex; align-items:center; gap:7px; flex-shrink:0; }
  #statusbar.done { background:#1a2e22; color:#5dba80; border-color:#1f4030; }
  .spin { width:10px;height:10px;border:1.5px solid rgba(255,255,255,.1);border-top-color:#6aaddf;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
  @keyframes spin {to{transform:rotate(360deg)}}

  #map { flex:1; }

  #panel { position:absolute; top:130px; right:10px; z-index:1000; background:rgba(10,10,10,.97); border:1px solid #333; border-radius:6px; padding:14px 15px; width:275px; font-size:12px; display:none; box-shadow:0 4px 20px rgba(0,0,0,.6); }
  #panel h3 { font-size:13px; font-weight:600; margin-bottom:10px; color:#fff; line-height:1.35; padding-right:16px; }
  .pbadge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:10px; font-weight:700; margin-bottom:8px; }
  .prow { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #1a1a1a; color:#666; font-size:11px; }
  .prow:last-child { border:none; }
  .prow span { color:#ccc; text-align:right; max-width:175px; }
  .pbar { margin:8px 0 3px; background:#1a1a1a; border-radius:3px; height:6px; overflow:hidden; }
  .pbar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#27ae60,#2ecc71); }
  .pct-lbl { font-size:11px; color:#27ae60; font-weight:600; margin-bottom:8px; }
  #close { position:absolute;top:8px;right:10px;cursor:pointer;color:#444;font-size:18px;line-height:1; }
  #close:hover { color:#fff; }
  .leaflet-tooltip { background:rgba(8,8,8,.93); border:1px solid #2a2a2a; color:#ddd; font-size:11px; padding:5px 8px; }
</style>

let geladen=0, errors=0;

// ─── KLEURSCHEMA'S PER VIEW ───────────────────────────────
const BEWONING_COLORS = {
  'Koop':            '#3a8fd1',
  'Huur':            '#e84040',
  'Gemengd':         '#f5a623',
  'Woningcorporatie':'#9b59b6',
  'Onbekend':        '#555'
};

const BLOK_COLORS = {
  'Ja':      '#e84040',
  'Nee':     '#3a8fd1',
  'Onbekend':'#444'
};

const NZ_COLORS = {
  'Middenmeer Noord': '#27ae60',
  'Middenmeer Zuid':  '#e67e22',
  '':                 '#444'
};

const LEGENDS = {
  voortgang: [
    {color:'#27ae60', label:'100% getekend'},
    {color:'#7dbb60', label:'75–99%'},
    {color:'#f39c12', label:'40–74%'},
    {color:'#e84040', label:'0–39%'},
    {color:'#222',    label:'0% / onbekend'}
  ],
  grootte: [
    {color:'#e84040', label:'Groot ≥8 adressen'},
    {color:'#4da6ff', label:'Klein <8 adressen'}
  ],
  bewoning: [
    {color:'#3a8fd1', label:'Koop'},
    {color:'#e84040', label:'Huur'},
    {color:'#f5a623', label:'Gemengd'},
    {color:'#9b59b6', label:'Woningcorporatie'},
    {color:'#555',    label:'Onbekend'}
  ],
  blokverwarming: [
    {color:'#e84040', label:'Blokverwarming'},
    {color:'#3a8fd1', label:'Geen blokverwarming'},
    {color:'#444',    label:'Onbekend'}
  ],
  noordzuid: [
    {color:'#27ae60', label:'Middenmeer Noord'},
    {color:'#e67e22', label:'Middenmeer Zuid'},
    {color:'#444',    label:'Buiten/onbekend'}
  ]
};

function renderLegend(view) {
  const leg = document.getElementById('legend');
  leg.innerHTML = LEGENDS[view].map(l =>
    `<div class="leg"><div class="ld" style="background:${l.color}"></div>${l.label}</div>`
  ).join('');
}

function getColor(vve, view) {
  if (view === 'voortgang') {
    if (vve.pct >= 100) return '#27ae60';
    if (vve.pct >= 75)  return '#7dbb60';
    if (vve.pct >= 40)  return '#f39c12';
    if (vve.pct > 0)    return '#e84040';
    return '#333';
  }
  if (view === 'grootte') return vve.groot ? '#e84040' : '#4da6ff';
  if (view === 'bewoning') return BEWONING_COLORS[vve.bewoning] || '#555';
  if (view === 'blokverwarming') return BLOK_COLORS[vve.blokverwarming] || '#444';
  if (view === 'noordzuid') return NZ_COLORS[vve.noord_zuid] || '#444';
  return '#888';
}

function makeIcon(vve, view) {
  const pct = vve.pct;
  const isGroot = vve.groot;
  const size = (view === 'grootte' || view === 'voortgang')
    ? (isGroot ? Math.min(20 + vve.totaal/5, 52) : Math.max(10, Math.min(8 + vve.totaal*1.5, 18)))
    : (isGroot ? 22 : 14);
  const half = size/2;
  const r = half - 2;
  const color = getColor(vve, view);
  const border = vve.twijfel ? '#666' : 'rgba(255,255,255,.25)';
  const dash = vve.twijfel ? '3 2' : '';

  let svg;
  if (view === 'voortgang' && pct > 0 && pct < 100) {
    const angle = pct/100*360;
    const rad = (angle-90)*Math.PI/180;
    const x = half + r*Math.cos(rad), y = half + r*Math.sin(rad);
    const large = angle > 180 ? 1 : 0;
    svg = `<circle cx="${half}" cy="${half}" r="${r}" fill="#333"/>
      <path d="M${half},${half} L${half},${half-r} A${r},${r} 0 ${large},1 ${x},${y} Z" fill="${color}"/>
      <circle cx="${half}" cy="${half}" r="${r}" fill="none" stroke="${border}" stroke-width="1.5" stroke-dasharray="${dash}"/>`;
  } else {
    svg = `<circle cx="${half}" cy="${half}" r="${r}" fill="${color}" stroke="${border}" stroke-width="1.5" stroke-dasharray="${dash}" fill-opacity="${vve.blokverwarming==='Onbekend'&&view==='blokverwarming'?0.25:0.85}"/>`;
  }

  return L.divIcon({
    html: `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`,
    className:'', iconSize:[size,size], iconAnchor:[half,half]
  });
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+view).classList.add('active');
  renderLegend(view);
  markers.forEach(m => m.setIcon(makeIcon(m._vve, view)));
}

function showPanel(vve) {
  document.getElementById('pn').textContent = vve.naam;
  const pb = document.getElementById('pb');
  pb.textContent = (vve.groot?'GROOT':'KLEIN')+' — '+vve.totaal+' adressen';
  pb.style.cssText = `background:${vve.groot?'#e84040':'#3a8fd1'};color:#fff`;
  document.getElementById('pf').style.width = vve.pct+'%';
  document.getElementById('pl').textContent = vve.getekend+' van '+vve.totaal+' getekend ('+vve.pct+'%)';
  document.getElementById('pt').textContent = vve.totaal;
  document.getElementById('pg').textContent = vve.getekend + (vve.pct>=100?' ✓':'');
  document.getElementById('pbew').textContent = vve.bewoning;
  document.getElementById('pkh').textContent = `${vve.n_koop} koop · ${vve.n_huur} huur · ${vve.n_corp} corp`;
  const blokSpan = document.getElementById('pblok');
  blokSpan.textContent = vve.blokverwarming;
  blokSpan.style.color = vve.blokverwarming==='Ja'?'#e84040':vve.blokverwarming==='Nee'?'#3a8fd1':'#555';
  document.getElementById('pgebied').textContent = vve.noord_zuid || '—';
  document.getElementById('pgo').textContent = vve.groot_onderhoud || '—';
  document.getElementById('panel').style.display='block';
}

function tick() {
  geladen++;
  document.getElementById('sl').textContent = geladen;
  if (geladen >= DATA.length) {
    document.getElementById('statusbar').className='done';
    document.getElementById('spin').style.display='none';
    document.getElementById('stxt').textContent=`✓ ${DATA.length} VvE's geladen — ${errors} niet gevonden`;
  } else {
    document.getElementById('stxt').textContent=`Geocodering via PDOK... ${geladen} / ${DATA.length}`;
  }
}

async function plot(vve) {
  const q = encodeURIComponent(vve.rep_straat+' '+vve.rep_hn+' Amsterdam');
  try {
    const r = await fetch(`https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=${q}&rows=1&fl=centroide_ll`,{signal:AbortSignal.timeout(10000)});
    const d = await r.json();
    const docs = d?.response?.docs;
    if (docs?.length && docs[0].centroide_ll) {
      const m = docs[0].centroide_ll.match(/POINT\(([0-9.]+)\s+([0-9.]+)\)/);
      if (m) {
        const lat=parseFloat(m[2]),lon=parseFloat(m[1]);
        const marker = L.marker([lat,lon],{icon:makeIcon(vve,currentView)});
        marker._vve = vve;
        const bewoningStr = vve.bewoning !== 'Onbekend' ? ` · ${vve.bewoning}` : '';
        const blokStr = vve.blokverwarming === 'Ja' ? ' · 🔥 Blokverw.' : '';
        marker.bindTooltip(`<strong>${vve.naam}</strong><br>${vve.totaal} adressen · ${vve.pct}% getekend${bewoningStr}${blokStr}`,{sticky:true});
        marker.on('click',()=>showPanel(vve));
        marker.addTo(map);
        markers.push(marker);
        tick(); return;
      }
    }
  } catch(e) {}
  errors++; tick();
}

// Init
renderLegend('voortgang');

async function loadAll() {
  for (let i=0;i<DATA.length;i+=8) {
    await Promise.all(DATA.slice(i,i+8).map(plot));
    if (i+8<DATA.length) await new Promise(r=>setTimeout(r,120));
  }
}
loadAll();
</script>
